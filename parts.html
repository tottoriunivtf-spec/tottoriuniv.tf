<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鳥取大学陸上競技部 - パート紹介</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="app-container">
    <nav class="navbar">
      <a href="index.html" class="brand">
        <i data-lucide="activity" color="var(--primary)" width="28" height="28"></i>
        Tottori T&F
      </a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link"><i data-lucide="home" width="18" height="18"></i> ホーム</a>
        <a href="goals.html" class="nav-link"><i data-lucide="target" width="18" height="18"></i> チーム目標</a>
        <a href="parts.html" class="nav-link active"><i data-lucide="info" width="18" height="18"></i> パート紹介</a>
        <a href="members.html" class="nav-link"><i data-lucide="users" width="18" height="18"></i> メンバー</a>
        <a href="activities.html" class="nav-link"><i data-lucide="activity" width="18" height="18"></i> 活動内容</a>
        <a href="blog.html" class="nav-link"><i data-lucide="edit-3" width="18" height="18"></i> 最近の活動</a>
        <a href="records.html" class="nav-link"><i data-lucide="trophy" width="18" height="18"></i> 歴代記録</a>
        <a href="last_year_records.html" class="nav-link"><i data-lucide="award" width="18" height="18"></i> 去年の記録</a>
      </div>
      <button class="mobile-menu-btn" id="mobile-menu-btn">
        <i data-lucide="menu" width="24" height="24"></i>
      </button>
    </nav>

    <main>
      <div class="container page-enter">
        <h1 class="page-title" data-en="PARTS">パート紹介</h1>

        <p style="text-align: center; color: var(--text-muted); margin-bottom: 3rem; font-size: 1.1rem;">
          鳥取大学陸上競技部は、各専門種目に分かれて日々練習に励んでいます。それぞれのパートの特徴をご紹介します。
        </p>

        <div class="parts-layout-desktop">
          <!-- 左側：円形メニュー -->
          <div class="parts-interactive">
            <div class="parts-circle-wrapper">
              <div class="circle-container" id="parts-circle-container">
                <div class="circle-track"></div>
                <p id="parts-loading-msg" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--text-muted); font-size: 0.9rem;">読み込み中...</p>
              </div>
            </div>
          </div>

          <!-- 右側：写真とテキスト -->
          <div class="parts-content-desktop">
            <div class="parts-section-container" id="parts-bg-container">
            </div>

            <div class="part-details-wrapper" style="position: relative; z-index: 10; padding: 2rem 1rem 4rem;">
              <div class="part-details" id="parts-details-container" style="margin: 0 auto;">
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p id="footer-year"></p>
    </footer>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('footer-year').innerHTML = `&copy; ${new Date().getFullYear()} Tottori University Track & Field Club. All rights reserved.`;
    });
  </script>
</body>

</html>
